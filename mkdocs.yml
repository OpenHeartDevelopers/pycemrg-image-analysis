site_name: pycemrg-image-analysis
site_description: Cardiac image segmentation post-processing library — CEMRG, Imperial College London
site_url: https://openheartdevelopers.github.io/pycemrg-image-analysis/
repo_url: https://github.com/OpenHeartDevelopers/pycemrg-image-analysis
repo_name: OpenHeartDevelopers/pycemrg-image-analysis

theme:
  name: material
  palette:
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started/index.md
  - Tutorials:
    - Custom Heartbuilder Pipeline: tutorials/custom_heartbuilder.md
  - Architecture: api/overview.md
  - Recipes & Workflows: api/recipes.md
  - API Reference:
    - api/index.md
    - Components: api/components.md
    - I/O Utilities: api/io.md
    - Spatial Queries: api/spatial.md
    - Label Tools: api/label_tools.md
    - Augmentation: api/augmentation.md
    - Metrics: api/metrics.md
  - CLI: cli/labels.md
  - Developer Guides:
    - Authoring a Recipe: guides/authoring_a_recipe.md
    - Add a Myocardium Component: guides/add_myocardium_component.md
